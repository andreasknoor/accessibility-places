name: Snapshot SEO Data

on:
  workflow_dispatch:       # Manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Snapshot SEO pages to Vercel Blob
        run: npm run snapshot:seo
        env:
          BLOB_READ_WRITE_TOKEN:       ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ACCESSIBILITY_CLOUD_API_KEY: ${{ secrets.ACCESSIBILITY_CLOUD_API_KEY }}
          REISEN_FUER_ALLE_API_KEY:    ${{ secrets.REISEN_FUER_ALLE_API_KEY }}
          REISEN_FUER_ALLE_API_BASE:   ${{ secrets.REISEN_FUER_ALLE_API_BASE }}
          GINTO_API_KEY:               ${{ secrets.GINTO_API_KEY }}
