name: Accessibility (axe)

# WCAG regression net (Phase 0, see docs/wcag-accessibility-plan.md). Runs the
# axe-core structural a11y tests on every push/PR. This catches the structural
# subset only (names/roles/labels/ARIA) — contrast, reflow, focus visibility and
# the real screen-reader experience still require manual / assistive-technology
# testing and are NOT covered here.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run axe structural a11y tests
        run: npm run test:a11y
