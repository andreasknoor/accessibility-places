name: Warm SEO Cache

on:
  schedule:
    - cron: "30 3 * * *"   # daily at 03:30 UTC (after check-seo-validity at 03:00)
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target URL (default: production)"
        required: false

jobs:
  warm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Warm ISR cache
        run: npm run warm:seo
        env:
          BASE_URL: ${{ inputs.base_url || 'https://accessible-places.org' }}
